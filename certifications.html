  <style>
    .cert-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      padding: 30px 0;
      max-width: 960px;
      margin: 0 auto;
    }
    
    .cert-card {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.06);
      background: #fff;
      width: 100%;
      height: 180px;
    }
    
    .cert-card:hover {
      box-shadow: 0 10px 30px rgba(0,0,0,0.12);
      transform: translateY(-4px);
    }
    
    .cert-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s ease;
    }
    
    .cert-card:hover .cert-thumb {
      transform: scale(1.08);
    }
    
    .cert-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    
    .cert-card:hover .cert-overlay {
      opacity: 1;
    }
    
    .cert-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: #fff;
      color: #333;
      border-radius: 25px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transform: translateY(15px);
      opacity: 0;
      transition: all 0.3s ease;
    }
    
    .cert-card:hover .cert-btn {
      transform: translateY(0);
      opacity: 1;
    }
    
    .cert-card:hover .cert-btn:nth-child(2) {
      transition-delay: 0.05s;
    }
    
    .cert-btn:hover {
      background: #3b82f6;
      color: #fff;
    }
    
    .cert-btn i {
      font-size: 13px;
    }
    
    @media (max-width: 768px) {
      .cert-grid {
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
      }
      
      .cert-card {
        height: 160px;
      }
    }
  </style>
